<script>
  (function () {
    var toggle = document.getElementById('nav-toggle');
    var menu   = document.getElementById('nav-menu');

    function closeAllDropdowns() {
      document.querySelectorAll('.nav__item--dropdown').forEach(function (item) {
        item.classList.remove('nav__item--open');
        var btn = item.querySelector('.nav__dropdown-toggle');
        if (btn) btn.setAttribute('aria-expanded', 'false');
      });
    }

    toggle.addEventListener('click', function (e) {
      e.stopPropagation();
      var isOpen = menu.classList.toggle('nav__menu--open');
      toggle.classList.toggle('nav__toggle--open', isOpen);
      toggle.setAttribute('aria-expanded', String(isOpen));
      if (!isOpen) closeAllDropdowns();
    });

    document.querySelectorAll('.nav__dropdown-toggle').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var item   = btn.closest('.nav__item--dropdown');
        var isOpen = item.classList.toggle('nav__item--open');
        btn.setAttribute('aria-expanded', String(isOpen));
      });
    });

    document.addEventListener('click', function (e) {
      if (menu.classList.contains('nav__menu--open') && !e.target.closest('#nav-menu')) {
        menu.classList.remove('nav__menu--open');
        toggle.classList.remove('nav__toggle--open');
        toggle.setAttribute('aria-expanded', 'false');
        closeAllDropdowns();
      } else if (!e.target.closest('.nav__item--dropdown')) {
        closeAllDropdowns();
      }
    });
  })();
</script>
