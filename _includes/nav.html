<script>
  (function () {
    var toggle = document.getElementById('nav-toggle');
    var menu   = document.getElementById('nav-menu');

    // Hamburger
    toggle.addEventListener('click', function () {
      var isOpen = menu.classList.toggle('nav__menu--open');
      toggle.classList.toggle('nav__toggle--open', isOpen);
      toggle.setAttribute('aria-expanded', isOpen);
    });

    // Dropdowns
    document.querySelectorAll('.nav__dropdown-toggle').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var item   = btn.closest('.nav__item--dropdown');
        var isOpen = item.classList.toggle('nav__item--open');
        btn.setAttribute('aria-expanded', isOpen);
      });
    });

    // Cerrar al hacer clic fuera
    document.addEventListener('click', function (e) {
      if (!e.target.closest('.nav__item--dropdown')) {
        document.querySelectorAll('.nav__item--dropdown').forEach(function (item) {
          item.classList.remove('nav__item--open');
          var btn = item.querySelector('.nav__dropdown-toggle');
          if (btn) btn.setAttribute('aria-expanded', 'false');
        });
      }
    });
  })();
</script>
